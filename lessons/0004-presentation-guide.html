<h2>2. 讲解要点</h2>

<h3>2.1 如何讲清楚"情绪"</h3>
<p>这是最容易引起听众困惑的点，建议这样讲：</p>

<div class="highlight">
  <strong>🗣️ 推荐讲解词：</strong><br>
  "论文中的'情绪'是一个严格的数学概念，不是说机器人真的'生气了'。它是用<strong>高斯分布的加权求和</strong>来表征的——简而言之，就是给地图上每一个有物体的格子赋予一个'感受值'。机器人在某处撞到人了，那这里的高斯分布就扩大，周围的格子也都被'传染'了负面感受。下次规划路径的时候，D* 算法看到这里的代价值高，就会自动绕开。所以本质上，这是一种<strong>自适应的代价地图</strong>。"
</div>

<h3>2.2 如何讲清楚 E2Map 更新</h3>
<div class="highlight">
  <strong>🗣️ 推荐讲解词：</strong><br>
  "更新的关键在于<strong>两个参数</strong>：协方差 \(\Sigma\) 控制'情绪影响多大范围'，权重 \(w\) 控制'情绪有多强'。撞到人了，情绪分数高 → 协方差变大（影响范围扩大）→ 但同时高斯分布的中心值会下降 → 所以我们用权重补偿，保持碰撞点的情绪强度不变。最终效果就是：碰撞点本身情绪很强，周围的区域也受到波及——这样下次机器人远远地就会绕开。"
</div>

<h3>2.3 如何讲实验结果</h3>
<div class="highlight">
  <strong>🗣️ 推荐讲解词：</strong><br>
  "最值得注意的是 VLMaps 在静态环境下也是 10/10，和 E2Map 一样好。但一旦环境发生变化或者出现动态物体，VLMaps 的成绩直接降到 0/10。这说明<strong>VLMaps 没有记忆</strong>——它每次都从头规划，所以每次都撞到同一个障碍物。而 E2Map 记下了上次的碰撞，所以第二次就绕开了。这就是自反思的价值。"
</div>

<h2>3. 常见 Q&A 准备</h2>

<div class="qa-card">
  <div class="q">这个方法是不是就是势场法的一个变种？</div>
  <div class="a">这个问题很有可能被问到！回答要点：① 情绪确实起到类似"斥力势场"的作用；② 但论文特意用了独立的 D* 规划器，而不是把目标作为"吸引力"，从而避免了势场法的局部极小值问题；③ 更重要的是，势场法的场是预先设计的，而 E2Map 的情绪场是<strong>从经验中学习并动态更新</strong>的。</div>
</div>

<div class="qa-card">
  <div class="q">为什么 E2Map 在 danger sign 场景中不是 10/10？</div>
  <div class="a">第一次导航时机器人会撞到危险标志（因为没有经验），这次碰撞触发 E2Map 更新。更新后，后续 9 次都成功避开了。所以 9/10 其实说明：第一次失败是"交学费"，之后 100% 成功了。这是一个很好的讨论点——可以引出"一次经验驱动调整"的含义。</div>
</div>

<div class="qa-card">
  <div class="q">这个方法需要 LLM 调用，实际部署的延迟和成本问题怎么解决？</div>
  <div class="a">论文中的 LLM/LMM 调用只在事件发生后触发，正常导航过程中不调用。但是每次事件处理确实需要 GPT-4o 和 Llama3 的推理时间。未来可以用更小的模型或边缘部署优化。</div>
</div>

<div class="qa-card">
  <div class="q">E2Map 和 VLMaps 的对比公平吗？VLMaps 没有设计事件处理和更新机制，当然比不过。 </div>
  <div class="a">这个问题有一定的道理。但论文想说明的恰恰是：<strong>在动态环境中，没有自反思能力的导航系统是不够的</strong>。如果选择同样具备学习能力的基线（如强化学习方法），E2Map 的优势又在于"单次调整"vs 强化学习的"多次迭代"。可以展开讨论不同的范式取舍。</div>
</div>

<div class="qa-card">
  <div class="q">真实环境为什么没做 dynamic door 实验？</div>
  <div class="a">论文说为了避免损坏机器人和门。这说明该方法中的碰撞检测和反应机制还不够安全。这是一个诚实的局限。</div>
</div>

<div class="qa-card">
  <div class="q">情绪评估器的评分是否可靠？会不会有偏差？</div>
  <div class="a">论文使用了少样本提示来规范输出，但从本质上看，LLM 的评分确实可能存在不一致性。这是一个值得探讨的问题——也许可以用多个 LLM 投票，或设计更严格的评估标准。</div>
</div>

<h2>4. 给你的额外建议</h2>

<div class="tip">
  <strong>💡 在组会上展现深度的三个技巧：</strong>
  <ol style="margin-left:1.2rem; margin-top:.3rem;">
    <li><strong>对比分析</strong>：不要只报结果，要解释"为什么VLMaps在静态中满分而在动态中零分？"——因为它的地图不更新</li>
    <li><strong>联系已有研究</strong>：如果你们组有人做过导航/规划相关的工作，主动建立联系——"和我们之前用的××方法相比，E2Map的优点是……"</li>
    <li><strong>提出延伸思考</strong>：在报告结尾抛出 1-2 个开放性思考题，如"如果要把E2Map用到我们的机器人平台上，最大的工程挑战会是什么？"</li>
  </ol>
</div>

<div class="warning">
  <strong>⚠️ 常见错误：</strong>
  <ul style="margin-left:1.2rem; margin-top:.3rem;">
    <li>不要把"情绪"拟人化得太夸张——听众会误解论文不是科幻</li>
    <li>不要跳过数学公式——但可以先用直觉讲清楚，再展示公式</li>
    <li>不要只读幻灯片上的字——要解释、要对比、要分析</li>
  </ul>
</div>
